<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Thilak Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
}

.login-box{
    width:350px;
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

h2{
    color:white;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

#error{
    color:red;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Portfolio Login</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>
function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "Thilak" &&
       password === "tporf@77"){

        window.location.href = "index.html";

    }else{

        document.getElementById("error").innerHTML =
        "Invalid Username or Password";

    }
}
</script>

</body>
</html>
